name: Keep Space Alive

on:
  schedule:
    # Run every 6 hours (HF Spaces sleep after 48 hours of inactivity)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual run from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://hey-neha-shl-assessment-recommender.hf.space/health)
          echo "Response code: $STATUS_CODE"
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Warning: Health check returned status $STATUS_CODE"
          else
            echo "Success: Space is awake!"
          fi
